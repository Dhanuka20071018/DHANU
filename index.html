<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHANU AI Studio</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #0f0c29; color: white; text-align: center; padding: 50px; }
        .container { max-width: 500px; margin: auto; background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; backdrop-filter: blur(10px); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 20px; font-size: 16px; }
        button { width: 90%; padding: 15px; border-radius: 10px; border: none; background: #00f2fe; color: black; font-weight: bold; cursor: pointer; }
        #imageDisplay { margin-top: 25px; min-height: 200px; }
        img { width: 100%; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h2>DHANU AI Generator</h2>
        <input type="text" id="promptInput" placeholder="සිහිනයක් විස්තර කරන්න... (English)">
        <button onclick="generateImage()">පින්තූරය සාදන්න ✨</button>
        <div id="imageDisplay"></div>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById("promptInput").value;
            const display = document.getElementById("imageDisplay");
            if (!prompt) return alert("කරුණාකර යමක් ලියන්න!");

            display.innerHTML = "<p>පින්තූරය අඳිමින් පවතී...</p>";
            const randomSeed = Math.floor(Math.random() * 1000000);
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&seed=${randomSeed}`;
            
            display.innerHTML = `<img src="${imageUrl}" onload="console.log('done')">`;
        }
    </script>
</body>
</html>
