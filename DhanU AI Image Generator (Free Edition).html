<!DOCTYPE html>

<html lang="si"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DhanU AI Image Generator (Free Edition)</title>
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .container { 
            width: 95%; 
            max-width: 550px; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 { color: #00f2fe; margin-bottom: 5px; letter-spacing: 1px; }
        p { color: #ccc; font-size: 14px; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            background: rgba(255, 255, 255, 0.1); 
            color: white; 
            font-size: 16px; 
            outline: none;
            border-bottom: 2px solid transparent;
        }
        input:focus { border-bottom: 2px solid #00f2fe; background: rgba(255, 255, 255, 0.15); }
        
        button { 
            width: 100%; 
            padding: 18px; 
            border-radius: 15px; 
            border: none; 
            background: linear-gradient(45deg, #00f2fe, #4facfe); 
            color: white; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
        }
        button:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0, 242, 254, 0.5); }
        button:active { transform: scale(0.98); }
        button:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        #imageDisplay { 
            margin-top: 30px; 
            min-height: 300px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 20px;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }
        img { width: 100%; height: auto; display: block; border-radius: 15px; animation: fadeIn 1s; }
        .loader-box { text-align: center; }
        .loader { 
            border: 4px solid #f3f3f3;
            border-top: 4px solid #00f2fe;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>DhanU AI Studio</h2>
        <p>සම්පූර්ණයෙන්ම නොමිලේ AI පින්තූර නිපදවන්න</p>
        
        <div class="input-group">
            <input type="text" id="promptInput" placeholder="ඔබට අවශ්‍ය පින්තූරය විස්තර කරන්න... (English)">
        </div>
        
        <button id="genBtn" onclick="generateImage()">Create Magic ✨</button>

        <div id="imageDisplay">
            <p style="color: #666; padding: 20px;">ඔබේ විස්තරයට අදාළ පින්තූරය මෙතැන දිස්වනු ඇත.</p>
        </div>
    </div>

    <script>
        async function generateImage() {
            const promptInput = document.getElementById("promptInput");
            const btn = document.getElementById("genBtn");
            const display = document.getElementById("imageDisplay");

            const promptText = promptInput.value.trim();

            if (!promptText) {
                alert("කරුණාකර පින්තූරය ගැන විස්තරයක් ලියන්න!");
                return;
            }

            // UI සූදානම් කිරීම
            btn.disabled = true;
            btn.innerText = "නිර්මාණය වෙමින් පවතී...";
            display.innerHTML = `
                <div class="loader-box">
                    <div class="loader"></div>
                    <p style="color: #00f2fe;">AI පින්තූරය අඳිමින් පවතී...</p>
                </div>
            `;

            try {
                // Pollinations AI API භාවිතා කිරීම
                // Random seed එකක් භාවිතා කිරීමෙන් සෑම විටම අලුත් පින්තූරයක් ලැබේ
                const randomSeed = Math.floor(Math.random() * 1000000);
                const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(promptText)}?width=1080&height=1080&nologo=true&seed=${randomSeed}`;

                // පින්තූරය Load වූ පසු පෙන්වීමට
                const img = new Image();
                img.src = imageUrl;
                img.onload = function() {
                    display.innerHTML = `<img src="${imageUrl}" alt="AI Generated Image">`;
                    btn.disabled = false;
                    btn.innerText = "Create Magic ✨";
                };

            } catch (error) {
                display.innerHTML = `<p style="color:#ff4b2b;">Error: සම්බන්ධතාවය පරීක්ෂා කර නැවත උත්සාහ කරන්න.</p>`;
                btn.disabled = false;
                btn.innerText = "Create Magic ✨";
            }
        }
    </script>

</body></html>
